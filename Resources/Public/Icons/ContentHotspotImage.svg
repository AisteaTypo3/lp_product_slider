<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Outer card -->
  <rect x="4" y="6" width="56" height="52" rx="10" fill="#0F172A"/>

  <!-- Image area -->
  <rect x="10" y="12" width="44" height="40" rx="7" fill="#1E293B"/>

  <!-- Sky gradient suggestion -->
  <rect x="10" y="12" width="44" height="20" rx="7" fill="#334155"/>
  <rect x="10" y="25" width="44" height="7" fill="#334155"/>

  <!-- Horizon / ground -->
  <rect x="10" y="32" width="44" height="20" rx="0" fill="#1E293B"/>
  <rect x="10" y="44" width="44" height="8" rx="0" fill="#1E293B"/>
  <rect x="10" y="44" width="44" height="8" rx="7" fill="#1E293B"/>

  <!-- Hotspot 1 – top left area: pulse ring + core -->
  <circle cx="24" cy="24" r="7" fill="#334155" opacity="0.6"/>
  <circle cx="24" cy="24" r="4" fill="#94A3B8"/>
  <circle cx="24" cy="24" r="2" fill="#CBD5E1"/>

  <!-- Hotspot 2 – center right -->
  <circle cx="43" cy="30" r="7" fill="#334155" opacity="0.6"/>
  <circle cx="43" cy="30" r="4" fill="#94A3B8"/>
  <circle cx="43" cy="30" r="2" fill="#CBD5E1"/>

  <!-- Hotspot 3 – bottom left -->
  <circle cx="20" cy="44" r="7" fill="#334155" opacity="0.6"/>
  <circle cx="20" cy="44" r="4" fill="#94A3B8"/>
  <circle cx="20" cy="44" r="2" fill="#CBD5E1"/>

  <!-- Small info panel on hotspot 1 -->
  <rect x="29" y="19" width="16" height="10" rx="3" fill="#475569"/>
  <rect x="31" y="22" width="10" height="2" rx="1" fill="#CBD5E1"/>
  <rect x="31" y="25" width="7" height="1.5" rx="0.75" fill="#94A3B8"/>
  <!-- Pointer triangle -->
  <rect x="27" y="23" width="3" height="3" rx="1" fill="#475569"/>
</svg>
